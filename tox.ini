[tox]
requires =
    tox>=4
    tox-uv>=1.16.3
env_list =
    lint

    py311-{django51,django52}
    py312-{django51,django52,django60,djangomain}
    py313-{django51,django52,django60,djangomain}
    py314-{django52,django60,djangomain}
    py315-{django60,djangomain}

    {py312,py313,py314}-{django52,django60}-{noredis,redis}
    {py312,py313,py314}-{django52,django60}-{nojwt,jwt}

    {py312,py313}-django52-jwt{53,54,55}
    {py312,py313}-django52-celery{53,54,55}

    {py312,py313,py314}-{django52,django60}-{psycopg2,psycopg3}

    coverage

[testenv]
runner = uv-venv-runner
description = Run the restflow test suite under {basepython} with the resolved Django release and any optional integrations selected by environment factors.
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=8.3.5
    pytest-cov>=6.0.0
    pytest-django>=4.10.0
    dj-database-url>=3.0.1
    pytz>=2025.2
    djangorestframework>=3.14
    pyjwt>=2.8

    django51: Django>=5.1,<5.2
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<7.0
    djangomain: https://github.com/django/django/archive/main.tar.gz

    redis: django-redis>=5.4.0

    jwt: djangorestframework-simplejwt>=5.3
    jwt53: djangorestframework-simplejwt>=5.3,<5.4
    jwt54: djangorestframework-simplejwt>=5.4,<5.5
    jwt55: djangorestframework-simplejwt>=5.5,<5.6

    celery53: celery>=5.3,<5.4
    celery54: celery>=5.4,<5.5
    celery55: celery>=5.5,<5.6

    psycopg2: psycopg2-binary>=2.9.10
    psycopg3: psycopg[binary]>=3.1
passenv =
    REDIS_URL
setenv =
    REDIS_URL = {env:REDIS_URL:redis://localhost:6379/15}
    psycopg2,psycopg3: POSTGRES_DB_URL = {env:POSTGRES_DB_URL:postgresql://postgres:postgres@localhost:5432/test_restflow}
commands =
    python runtests.py {posargs}

[testenv:py{312,313,314}-djangomain]
ignore_outcome = true

[testenv:py315-{django60,djangomain}]
ignore_outcome = true

[testenv:coverage]
runner = uv-venv-runner
description = Full-stack coverage on Python 3.14 and Django 6.0 with Postgres, Redis, every supported broker, drf-spectacular, and djangorestframework-simplejwt.
package = wheel
wheel_build_env = .pkg
basepython = py314
deps =
    pytest>=8.3.5
    pytest-cov>=6.0.0
    pytest-django>=4.10.0
    dj-database-url>=3.0.1
    pytz>=2025.2
    djangorestframework>=3.14
    pyjwt>=2.8
    Django>=6.0,<7.0
    django-redis>=5.4.0
    psycopg2-binary>=2.9.10
    djangorestframework-simplejwt>=5.3
    drf-spectacular>=0.27
    celery>=5.3
    django-q2>=1.7
    django-rq>=2.10
    dramatiq>=1.16
passenv =
    POSTGRES_DB_URL
    REDIS_URL
setenv =
    REDIS_URL = {env:REDIS_URL:redis://localhost:6379/15}
    POSTGRES_DB_URL = {env:POSTGRES_DB_URL:postgresql://postgres:postgres@localhost:5432/test_restflow}
commands =
    python runtests.py --coverage {posargs}
    coverage report
    coverage html

[testenv:lint]
runner = uv-venv-runner
description = Run static analysis with ruff against the restflow package.
skip_install = true
deps =
    ruff>=0.9.9
commands =
    ruff check restflow
