services:
  

  valkey:
    image: valkey/valkey:8-alpine
    container_name: restflow-valkey
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restflow-network

  keydb:
    image: eqalpha/keydb:latest
    container_name: restflow-keydb
    restart: unless-stopped
    ports:
      - "${KEYDB_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restflow-network

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: restflow-dragonfly
    restart: unless-stopped
    ulimits:
      memlock: -1
    ports:
      - "${DRAGONFLY_PORT:-6382}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restflow-network

volumes:
  postgres_data:
    driver: local

networks:
  restflow-network:
    driver: bridge
