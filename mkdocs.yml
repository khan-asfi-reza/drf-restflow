site_name: Restflow
site_description: Declarative library for Django REST Framework
site_url: https://restflow.khanasfireza.dev/
repo_url: https://github.com/khan-asfi-reza/drf-restflow
repo_name: khan-asfi-reza/drf-restflow
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: light
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2
            filters:
              - "!^_"
  - macros:
      module_name: docs/macros

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Basic Concepts: getting-started/concepts.md
  - Guide:
      - Overview: guide/index.md
      - Caching:
          - Overview: guide/caching/index.md
          - Key Constructors: guide/caching/key-constructors.md
          - cache_result: guide/caching/cache-result.md
          - cache_response: guide/caching/cache-response.md
          - Invalidation Rules: guide/caching/invalidation.md
          - Dispatchers: guide/caching/dispatchers.md
          - Response Headers: guide/caching/response-headers.md
      - Filtering:
          - FilterSet: guide/filtering/filterset.md
          - Fields: guide/filtering/fields.md
          - DRF Integration: guide/filtering/integration.md
      - Serializers:
          - Overview: guide/serializers/index.md
          - Type annotations: guide/serializers/type-annotations.md
          - Model serializers: guide/serializers/model-serializers.md
          - Inline serializers: guide/serializers/inline.md
          - ValidatedData: guide/serializers/validated-data.md
      - Authentication:
          - Overview: guide/authentication/index.md
          - JWT: guide/authentication/jwt.md
          - SimpleJWT adapter: guide/authentication/simplejwt.md
          - Built-in classes: guide/authentication/built-in.md
      - Permissions:
          - Overview: guide/permissions/index.md
      - Views:
          - Overview: guide/views/index.md
          - APIView: guide/views/apiview.md
          - Generic views: guide/views/generic-views.md
          - Mixins: guide/views/mixins.md
          - Viewsets: guide/views/viewsets.md
          - Action configs: guide/views/action-configs.md
          - PostFetch: guide/views/post-fetch.md
      - Pagination:
          - Overview: guide/pagination/index.md
      - Throttling:
          - Overview: guide/throttling/index.md
      - Responses:
          - Overview: guide/responses/index.md
      - Exception handler:
          - Overview: guide/exception-handler/index.md
      - Spectacular:
          - Overview: guide/spectacular/index.md
      - Testing:
          - Overview: guide/testing/index.md
      - Settings: guide/settings.md
      - Helpers: guide/helpers.md
  - API Reference:
      - Caching:
          - cache_result: api/caching/cache-result.md
          - cache_response: api/caching/cache-response.md
          - KeyConstructor: api/caching/key-constructor.md
          - Key Fields: api/caching/key-fields.md
          - InvalidationRule: api/caching/invalidation-rule.md
          - Dispatchers: api/caching/dispatchers.md
      - Filters:
          - FilterSet: api/filters/filterset.md
          - Field: api/filters/field.md
          - Field Types: api/filters/field-types.md
          - InlineFilterSet: api/filters/inline-filterset.md
          - Backend: api/filters/backend.md
      - Serializers:
          - Serializers: api/serializers/serializers.md
          - Fields: api/serializers/fields.md
      - Authentication:
          - JWT: api/authentication/jwt.md
          - JWT views: api/authentication/jwt-views.md
          - Blacklist backends: api/authentication/blacklist.md
          - SimpleJWT: api/authentication/simplejwt.md
